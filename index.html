<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Editoriale Premium Cloud</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
:root {
    --bg-main: #f8fafc;
    --bg-card: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
    --accent-ig: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    --accent-fb: #1877f2;
    --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.08);
}
body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 30px; }
.header-container { background: var(--bg-card); border-radius: 24px; padding: 32px; box-shadow: var(--shadow-md); margin-bottom: 32px; border: 1px solid var(--border-color); }
.header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
.header-title { margin: 0; font-size: 28px; font-weight: 800; border-bottom: 2px dashed #cbd5e1; padding: 2px 8px; }
.btn-group { display: flex; gap: 12px; }
button { border: none; padding: 12px 22px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.add { background: #0f172a; color: white; }
.export { background: #0284c7; color: white; }
.clear-btn { background: #ef4444; color: white; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; }
.card { background: var(--bg-card); border-radius: 24px; padding: 26px; border: 1px solid var(--border-color); position: relative; display: flex; flex-direction: column; gap: 16px; }
.badge { display: inline-flex; align-items: center; align-self: flex-start; padding: 6px 16px; border-radius: 30px; font-size: 12px; font-weight: 700; color: white; cursor: pointer; text-transform: uppercase; }
.ig { background: var(--accent-ig); }
.fb { background: var(--accent-fb); }
.image-preview-container { height: 280px; background: #f1f5f9; border-radius: 16px; overflow: hidden; position: relative; cursor: zoom-in; }
.image-preview { width: 100%; height: 100%; object-fit: cover; }
.remove-image-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9); border-radius: 50%; border: none; cursor: pointer; padding: 5px 10px; color: #ef4444; }
.placeholder { height: 280px; border: 2px dashed #cbd5e1; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #64748b; }
[contenteditable="true"]:focus { background: #f1f5f9; outline: none; border-radius: 4px; }
.field-row { display: flex; gap: 8px; border-bottom: 1px dashed #f1f5f9; padding: 4px 0; }
.field-label { font-weight: 700; color: #475569; min-width: 75px; }

/* LIGHTBOX */
.lightbox-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.95); z-index: 1000; justify-content: center; align-items: center; }
.lightbox-overlay.active { display: flex; }
.lightbox-image { max-width: 90%; max-height: 90vh; border-radius: 12px; }
.lightbox-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
</style>
</head>
<body>

<div class="header-container">
    <div class="header-row">
        <h2 class="header-title" contenteditable="true" id="main-title" onblur="saveHeader()">📅 Piano Editoriale</h2>
        <div class="btn-group">
            <button class="clear-btn" onclick="resetTutto()">Svuota</button>
            <button class="add" onclick="addCard()">+ Aggiungi</button>
            <button class="export" onclick="window.print()">Export</button>
        </div>
    </div>
</div>

<div class="grid" id="grid"></div>

<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-image" id="lightbox-img" src="" alt="Zoom">
</div>

<input type="file" id="hiddenFileInput" style="display: none;" accept="image/*">

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDLsaTE3d1bBgv2QgF9vsnLPT60KELxgzE",
    authDomain: "piano-editoriale-cloud.firebaseapp.com",
    databaseURL: "https://piano-editoriale-cloud-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "piano-editoriale-cloud",
    storageBucket: "piano-editoriale-cloud.firebasestorage.app",
    messagingSenderId: "388347437220",
    appId: "1:388347437220:web:5f5af3453328dd89c44631"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const boardRef = db.ref("boards/" + (new URLSearchParams(window.location.search).get('b') || 'default'));

let data = [];
let currentImageTargetIndex = -1;

boardRef.on('value', (snapshot) => {
    const val = snapshot.val();
    data = val ? (val.posts || []) : [];
    render();
});

function openLightbox(url) {
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    data.forEach((item, i) => {
        const card = document.createElement("div");
        card.className = "card";
        const imageHtml = item.imageUrl 
            ? `<div class="image-preview-container" onclick="openLightbox('${item.imageUrl}')"><img src="${item.imageUrl}" class="image-preview"><button class="remove-image-btn" onclick="event.stopPropagation(); removeImage(${i})">X</button></div>`
            : `<div class="placeholder" onclick="selectImage(${i})"><span>+ Aggiungi Immagine</span></div>`;
        
        card.innerHTML = `
            <div class="badge ${item.platform}" onclick="togglePlatform(${i})">${item.platform.toUpperCase()}</div>
            <div class="card-title" contenteditable="true" onblur="updateField(${i}, 'title', this.innerText)">${item.title}</div>
            ${imageHtml}
            <div class="field-row"><span class="field-label">Copy:</span><div contenteditable="true" onblur="updateField(${i}, 'copy', this.innerText)">${item.copy}</div></div>
            <button class="clear-btn" style="padding: 5px; font-size: 10px;" onclick="deleteCard(${i})">Elimina Post</button>
        `;
        grid.appendChild(card);
    });
}

function selectImage(i) { currentImageTargetIndex = i; document.getElementById('hiddenFileInput').click(); }
document.getElementById('hiddenFileInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => { data[currentImageTargetIndex].imageUrl = ev.target.result; boardRef.child("posts").set(data); };
    reader.readAsDataURL(e.target.files[0]);
};

function updateField(i, f, v) { data[i][f] = v; boardRef.child("posts").set(data); }
function togglePlatform(i) { data[i].platform = data[i].platform === 'ig' ? 'fb' : 'ig'; boardRef.child("posts").set(data); }
function addCard() { data.push({platform: 'ig', title: 'Nuovo Post', copy: '...', imageUrl: ''}); boardRef.child("posts").set(data); }
function deleteCard(i) { data.splice(i, 1); boardRef.child("posts").set(data); }
function removeImage(i) { data[i].imageUrl = ''; boardRef.child("posts").set(data); }
function resetTutto() { if(confirm('Sicuro?')) boardRef.remove(); }
</script>
</body>
</html>
